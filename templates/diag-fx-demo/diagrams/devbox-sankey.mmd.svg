<svg id="my-svg" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="max-width: 600px; background-color: rgb(30, 30, 46);" viewBox="0 0 600 400" role="graphics-document document" aria-roledescription="sankey"><style>#my-svg{font-family:JetBrains Mono,Fira Code,DejaVu Sans Mono,monospace;font-size:16px;fill:#cdd6f4;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:#313244;}#my-svg .error-text{fill:#cdd6f4;stroke:#cdd6f4;}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#a6adc8;stroke:#a6adc8;}#my-svg .marker.cross{stroke:#a6adc8;}#my-svg svg{font-family:JetBrains Mono,Fira Code,DejaVu Sans Mono,monospace;font-size:16px;}#my-svg p{margin:0;}#my-svg .label{font-family:JetBrains Mono,Fira Code,DejaVu Sans Mono,monospace;}#my-svg .node .neo-node{stroke:#a6adc8;}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node path{stroke:url(#my-svg-gradient);stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node .neo-line path{stroke:#a6adc8;filter:none;}#my-svg [data-look="neo"].node circle{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(1